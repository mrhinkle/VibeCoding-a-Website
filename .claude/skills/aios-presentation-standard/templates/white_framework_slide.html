    <title>S.M.A.R.T. Framework</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #FFFFFF; font-family: 'Inter Tight', sans-serif; color: #111111; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            position: relative;
            padding: 60px 80px 80px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        
        .header {
            border-bottom: 2px solid #111111;
            padding-bottom: 20px;
        }
        h1 { font-size: 56px; font-weight: 800; letter-spacing: -1px; color: #111111; }
        .subtitle { font-family: 'JetBrains Mono', monospace; font-size: 24px; color: #555555; margin-top: 8px; }

        .framework-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
            margin-top: 40px;
            position: relative;
        }

        .step-box {
            flex: 1;
            height: 280px;
            background: #F5F7FA;
            border: 2px solid #E1E4E8;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            margin: 0 10px;
            transition: all 0.3s ease;
        }

        .step-box:hover {
            border-color: #f44800;
            background: #FFF5F0;
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .letter {
            font-size: 80px;
            font-weight: 800;
            color: #f44800;
            margin-bottom: 10px;
            line-height: 1;
        }

        .step-title {
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #111111;
            margin-bottom: 10px;
        }

        .step-desc {
            font-size: 16px;
            color: #555555;
            line-height: 1.4;
        }

        .connector {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 4px;
            background: #E1E4E8;
            z-index: -1;
            transform: translateY(-50%);
        }

        .aios-icon-topright { position: absolute; top: 40px; right: 40px; width: 50px; height: 50px; object-fit: contain; }
            /* NEW AIOS logo bottom right */
                        .aios-logo-bottom { 
            position: absolute; 
            bottom: 8px; 
            right: 40px; 
            height: 48px; 
            width: auto; 
            object-fit: contain; 
        }
        /* Footer text bottom left */
        .slide-footer {
            position: absolute;
            bottom: 24px;
            left: 40px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: #f44800;
            font-weight: 600;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
    </style>
