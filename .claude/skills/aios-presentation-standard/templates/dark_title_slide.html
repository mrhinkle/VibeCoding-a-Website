<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beyond the Prompt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0F1115;
            color: #FFFFFF;
            font-family: 'Inter Tight', sans-serif;
            overflow: hidden;
        }

        .slide-container {
            width: 1280px;
            height: 720px;
            position: relative;
            background-color: #0F1115;
            background-image: 
                linear-gradient(rgba(165, 179, 206, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(165, 179, 206, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px 80px 100px;
            box-sizing: border-box;
        }

        .content-wrapper {
            position: relative;
            z-index: 2;
            max-width: 900px;
        }

        .eyebrow {
            font-family: 'JetBrains Mono', monospace;
            color: #f44800;
            font-size: 20px;
            margin-bottom: 24px;
            display: inline-block;
            padding: 8px 16px;
            border: 1px solid rgba(244, 72, 0, 0.3);
            background: rgba(244, 72, 0, 0.1);
            border-radius: 4px;
        }

        h1 {
            font-size: 96px;
            line-height: 1.1;
            font-weight: 800;
            margin: 0 0 24px 0;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #FFFFFF 0%, #A5B3CE 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-size: 32px;
            font-weight: 400;
            color: #A5B3CE;
            margin: 0 0 64px 0;
            line-height: 1.4;
            max-width: 800px;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: auto auto;
            gap: 64px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 20px;
            border-top: 1px solid rgba(165, 179, 206, 0.2);
            padding-top: 32px;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .meta-label {
            color: #A5B3CE;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .meta-value {
            color: #FFFFFF;
            font-weight: 700;
        }

        .meta-sub {
            color: #f44800;
            font-weight: 400;
        }

        /* Decorative visual element */
        .visual-node {
            position: absolute;
            right: -100px;
            top: 50%;
            transform: translateY(-50%);
            width: 600px;
            height: 600px;
            opacity: 0.1;
            z-index: 1;
        }

        .cursor {
            display: inline-block;
            width: 12px;
            height: 24px;
            background-color: #f44800;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 8px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    
        /* AIOS icon — upper right */
        .aios-icon-topright {
            position: absolute;
            top: 24px;
            right: 32px;
            width: 44px;
            height: 44px;
            object-fit: contain;
            opacity: 0.9;
        }
    
        .aios-lockup {
            position: absolute;
            bottom: 20px;
            right: 80px;
            display: flex;
            align-items: center;
        }
        .aios-lockup-icon { height: 36px; width: auto; object-fit: contain; }
    </style>
</head>
