    <title>Immediate Action Plan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0F1115; font-family: 'Inter Tight', sans-serif; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            position: relative;
            background: #0F1115;
            padding: 48px 72px 100px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .slide-header { border-bottom: 2px solid #333; padding-bottom: 16px; }
        h1 { font-size: 46px; font-weight: 800; color: #FFFFFF; letter-spacing: -1px; margin: 0; }
        .subtitle { font-family: 'JetBrains Mono', monospace; font-size: 24px; color: #A5B3CE; margin-top: 6px; }
        .plan-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 32px;
            flex: 1;
        }
        .plan-card {
            border: 1px solid #333;
            background: #1A1D24;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative;
            overflow: hidden;
        }
        .plan-card.highlight {
            border-color: #f44800;
            background: rgba(244, 72, 0, 0.1);
        }
        .step-number {
            font-size: 80px;
            font-weight: 800;
            color: #333;
            line-height: 0.8;
            position: absolute;
            top: 20px;
            right: 20px;
            opacity: 0.5;
        }
        .plan-card.highlight .step-number { color: #f44800; opacity: 0.2; }
        .card-title {
            font-size: 32px;
            font-weight: 800;
            color: #FFFFFF;
            margin-top: 20px;
            position: relative;
            z-index: 1;
        }
        .card-desc {
            font-size: 20px; /* OK */
            color: #A5B3CE;
            line-height: 1.4;
            position: relative;
            z-index: 1;
        }
        .time-badge {
            display: inline-block;
            background: #FFFFFF;
            color: #0F1115;
            padding: 6px 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 20px; /* Increased from 14px */
            font-weight: 700;
            border-radius: 4px;
            align-self: flex-start;
            margin-bottom: 8px;
        }
        .plan-card.highlight .time-badge { background: #f44800; color: #FFFFFF; }
        /* AIOS icon upper right */
        .aios-icon-topright { position: absolute; top: 24px; right: 32px; width: 44px; height: 44px; object-fit: contain; opacity: 0.9; }
        /* AIOS lockup bottom right */
        .aios-lockup { position: absolute; bottom: 20px; right: 80px; display: flex; align-items: center; }
        .aios-lockup-icon { height: 36px; width: auto; object-fit: contain; }
    </style>
</head>
